name: 自动打包 EXE

on:
  push:
    branches: [ main ]  # 推送到 main 分支就自动打包

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包成 EXE
        run: pyinstaller -F -w -i co.ico main.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: my-exe-file
          path: dist/*.exe